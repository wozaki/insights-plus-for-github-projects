name: Release

on:
  push:
    branches:
      - main
    paths:
      - "package.json"

jobs:
  release:
    runs-on: ubuntu-latest
    environment: chrome-web-store
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          if git fetch --tags && git tag -l "${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Exit if tag exists
        if: steps.check_tag.outputs.exists == 'true'
        run: |
          echo "Tag ${{ steps.version.outputs.tag }} already exists. Skipping."
          exit 0

      - uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1 # v6
        if: steps.check_tag.outputs.exists == 'false'

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        if: steps.check_tag.outputs.exists == 'false'
        with:
          node-version: "24"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
        if: steps.check_tag.outputs.exists == 'false'

      - name: Build
        if: steps.check_tag.outputs.exists == 'false'
        run: pnpm wxt zip

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: .output/*.zip
          generate_release_notes: true

      - name: Submit to Chrome Web Store
        if: steps.check_tag.outputs.exists == 'false'
        run: pnpm wxt submit --chrome-zip .output/*-chrome.zip
        env:
          CHROME_EXTENSION_ID: eeadfjedbkhpjbccolcfbhflfckmfcmj
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          CHROME_PUBLISH_TARGET: default
          CHROME_SKIP_SUBMIT_REVIEW: "false"
