name: Release

on:
  push:
    branches:
      - main
    paths:
      - "package.json"

jobs:
  release:
    runs-on: ubuntu-latest
    environment: chrome-web-store
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          if git fetch --tags && git tag -l "${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Exit if tag exists
        if: steps.check_tag.outputs.exists == 'true'
        run: |
          echo "Tag ${{ steps.version.outputs.tag }} already exists. Skipping."
          exit 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        if: steps.check_tag.outputs.exists == 'false'
        with:
          node-version: "24"

      - name: Enable pnpm via Corepack
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          corepack enable
          pnpm --version

      - run: pnpm install --frozen-lockfile
        if: steps.check_tag.outputs.exists == 'false'

      - name: Build
        if: steps.check_tag.outputs.exists == 'false'
        run: pnpm wxt zip

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: .output/*.zip
          generate_release_notes: true

      - name: Submit to Chrome Web Store
        if: steps.check_tag.outputs.exists == 'false'
        run: pnpm wxt submit --chrome-zip .output/*-chrome.zip
        env:
          CHROME_EXTENSION_ID: eeadfjedbkhpjbccolcfbhflfckmfcmj
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          CHROME_PUBLISH_TARGET: default
          CHROME_SKIP_SUBMIT_REVIEW: "false"
